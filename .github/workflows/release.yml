name: Build and Release Binaries

on:
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --clean --onefile --name ghostclaw src/ghostclaw/cli/ghostclaw.py

      - name: Rename binary (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: mv dist/ghostclaw dist/ghostclaw-${{ runner.os }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path dist\ghostclaw.exe -NewName ghostclaw-${{ runner.os }}.exe

      - name: Upload binary to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ghostclaw*
